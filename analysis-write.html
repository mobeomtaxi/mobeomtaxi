<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>분석 게시판 글쓰기</title>
  <style>
    :root{
      --brand:#FFB121;
      --line:#e5e7eb;
      --bg:#f5f6f8;
      --text:#111827;
      --muted:#6b7280;
      --danger:#e74c3c;
      --card:#ffffff;
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}
    body{
      background:var(--bg);
      color:var(--text);
      padding:20px;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:24px;
      box-shadow:0 8px 24px rgba(0,0,0,.04);
    }

    .title{
      font-size:28px;
      font-weight:900;
      margin-bottom:22px;
    }

    .row{
      display:grid;
      grid-template-columns:140px 1fr;
      gap:16px;
      align-items:start;
      padding:14px 0;
      border-top:1px solid var(--line);
    }

    .row:first-of-type{
      border-top:none;
    }

    .label{
      font-weight:900;
      font-size:15px;
      padding-top:10px;
    }

    .req{
      color:var(--danger);
      margin-left:4px;
    }

    input[type="text"],
    select,
    textarea{
      width:100%;
      border:1px solid #d1d5db;
      border-radius:10px;
      padding:12px 14px;
      font-size:14px;
      outline:none;
      background:#fff;
    }

    input[type="text"]:focus,
    select:focus,
    textarea:focus{
      border-color:var(--brand);
      box-shadow:0 0 0 4px rgba(255,177,33,.14);
    }

    textarea{
      min-height:260px;
      resize:vertical;
      line-height:1.55;
    }

    .inline{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      height:42px;
      padding:0 16px;
      border-radius:10px;
      border:1px solid #d1d5db;
      background:#fff;
      font-weight:800;
      cursor:pointer;
    }

    .btn:hover{opacity:.95;}

    .btn.brand{
      background:var(--brand);
      border-color:var(--brand);
      color:#fff;
    }

    .btn.danger{
      background:#fff5f5;
      border-color:#f5c2c7;
      color:#c0392b;
    }

    .help{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }

    .warn{
      color:var(--danger);
      font-size:12px;
      font-weight:800;
      margin-top:6px;
    }

    .file-box{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .file-name{
      flex:1;
      min-width:220px;
      border:1px solid #d1d5db;
      background:#fafafa;
      border-radius:10px;
      height:42px;
      display:flex;
      align-items:center;
      padding:0 12px;
      font-size:13px;
      color:#555;
    }

    .pick-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .pick-item{
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
      background:#fafafa;
    }

    .pick-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
      font-weight:900;
      font-size:14px;
    }

    .pick-grid{
      display:grid;
      grid-template-columns:1.3fr 1fr 40px 1fr 1fr;
      gap:10px;
    }

    .vs-box{
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      color:#444;
    }

    .toolbar{
      display:flex;
      gap:8px;
      margin-top:10px;
      flex-wrap:wrap;
    }

    .tool-btn{
      width:42px;
      height:42px;
      border:1px solid #d1d5db;
      border-radius:10px;
      background:#fff;
      cursor:pointer;
      font-size:16px;
    }

    .tag-input{
      width:100%;
    }

    .bottom-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:24px;
      border-top:1px solid var(--line);
      padding-top:20px;
    }

    .bottom-actions .btn{
      height:52px;
      font-size:16px;
      font-weight:900;
    }

    .msg{
      margin-top:12px;
      font-size:13px;
      font-weight:800;
    }

    .msg.ok{color:#2e7d32;}
    .msg.bad{color:#c0392b;}

    @media (max-width: 900px){
      .row{
        grid-template-columns:1fr;
        gap:8px;
      }

      .label{
        padding-top:0;
      }

      .pick-grid{
        grid-template-columns:1fr;
      }

      .vs-box{
        justify-content:flex-start;
      }

      .bottom-actions{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">분석 게시판 글쓰기</div>

    <div class="row">
      <div class="label">종목 <span class="req">*</span></div>
      <div>
        <select id="category">
          <option value="">선택하세요</option>
          <option value="축구">축구</option>
          <option value="농구">농구</option>
          <option value="야구">야구</option>
          <option value="배구">배구</option>
          <option value="하키">하키</option>
          <option value="격투기">격투기</option>
          <option value="기타">기타</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="label">제목 <span class="req">*</span></div>
      <div>
        <input id="title" type="text" placeholder="제목을 입력하세요" />
      </div>
    </div>

    <div class="row">
      <div class="label">이미지 추가</div>
      <div>
        <div class="file-box">
          <button class="btn" type="button" onclick="document.getElementById('images').click()">+ 파일 추가</button>
          <button class="btn danger" type="button" onclick="clearFiles()">※ 파일 삭제</button>
          <div id="fileNames" class="file-name">선택된 파일 없음</div>
        </div>
        <input id="images" type="file" multiple accept="image/*" style="display:none" />
      </div>
    </div>

    <div class="row">
      <div class="label">상세 내용 <span class="req">*</span></div>
      <div>
        <textarea id="content" placeholder="분석 내용을 입력하세요"></textarea>
        <div class="warn">※ 경고! 무성의한 글 작성 시 패널티 부여될 수 있습니다.</div>

        <div class="toolbar">
          <button class="tool-btn" type="button">☺</button>
          <button class="tool-btn" type="button">⚑</button>
          <button class="tool-btn" type="button">▶</button>
          <button class="tool-btn" type="button">⟳</button>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="label">추천 픽 등록</div>
      <div>
        <div class="inline" style="margin-bottom:12px;">
          <button class="btn" type="button" onclick="addPick()">+ 픽 추가</button>
        </div>

        <div id="pickList" class="pick-list">
          <div class="pick-item">
            <div class="pick-top">
              <span>추천 픽 1</span>
              <button class="btn danger" type="button" onclick="removePick(this)">삭제</button>
            </div>

            <div class="pick-grid">
              <input type="text" class="pick-schedule" placeholder="경기 일정" />
              <input type="text" class="pick-team1" placeholder="대결 팀 1" />
              <div class="vs-box">VS</div>
              <input type="text" class="pick-team2" placeholder="대결 팀 2" />
              <input type="text" class="pick-prediction" placeholder="예상 픽" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="label">태그</div>
      <div>
        <input id="tags" class="tag-input" type="text" placeholder="콤마(,)로 구분하여 복수 태그 등록 가능" />
      </div>
    </div>

    <div class="bottom-actions">
      <button class="btn" type="button" onclick="history.back()">취소</button>
      <button class="btn brand" type="button" onclick="submitAnalysisPost()">작성완료</button>
    </div>

    <div id="msg" class="msg"></div>
  </div>

  <script>
    const imageInput = document.getElementById("images");
    const fileNames = document.getElementById("fileNames");
    const pickList = document.getElementById("pickList");
    const msg = document.getElementById("msg");

    imageInput.addEventListener("change", () => {
      const files = [...imageInput.files];
      if (!files.length) {
        fileNames.textContent = "선택된 파일 없음";
        return;
      }
      fileNames.textContent = files.map(f => f.name).join(", ");
    });

    function clearFiles(){
      imageInput.value = "";
      fileNames.textContent = "선택된 파일 없음";
    }

    function addPick(){
      const count = pickList.querySelectorAll(".pick-item").length + 1;
      const div = document.createElement("div");
      div.className = "pick-item";
      div.innerHTML = `
        <div class="pick-top">
          <span>추천 픽 ${count}</span>
          <button class="btn danger" type="button" onclick="removePick(this)">삭제</button>
        </div>
        <div class="pick-grid">
          <input type="text" class="pick-schedule" placeholder="경기 일정" />
          <input type="text" class="pick-team1" placeholder="대결 팀 1" />
          <div class="vs-box">VS</div>
          <input type="text" class="pick-team2" placeholder="대결 팀 2" />
          <input type="text" class="pick-prediction" placeholder="예상 픽" />
        </div>
      `;
      pickList.appendChild(div);
      resetPickNumbers();
    }

    function removePick(btn){
      const items = pickList.querySelectorAll(".pick-item");
      if(items.length === 1){
        alert("최소 1개의 추천 픽은 유지하세요.");
        return;
      }
      btn.closest(".pick-item").remove();
      resetPickNumbers();
    }

    function resetPickNumbers(){
      [...pickList.querySelectorAll(".pick-item")].forEach((item, idx) => {
        const title = item.querySelector(".pick-top span");
        title.textContent = `추천 픽 ${idx + 1}`;
      });
    }

    function setMsg(text, type=""){
      msg.textContent = text || "";
      msg.className = "msg " + type;
    }

    async function submitAnalysisPost(){
      const category = document.getElementById("category").value.trim();
      const title = document.getElementById("title").value.trim();
      const content = document.getElementById("content").value.trim();
      const tags = document.getElementById("tags").value.trim();

      if(!category) return alert("종목을 선택하세요.");
      if(!title) return alert("제목을 입력하세요.");
      if(!content) return alert("상세 내용을 입력하세요.");

      const picks = [...document.querySelectorAll(".pick-item")].map(item => ({
        schedule: item.querySelector(".pick-schedule").value.trim(),
        team1: item.querySelector(".pick-team1").value.trim(),
        team2: item.querySelector(".pick-team2").value.trim(),
        prediction: item.querySelector(".pick-prediction").value.trim()
      }));

      setMsg("등록 중...", "");

      try{
        const res = await fetch("/api/posts/create", {
          method: "POST",
          credentials: "include",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            board: "analysis",
            category,
            title,
            content,
            tags,
            picks
          })
        });

        const data = await res.json().catch(() => null);

        if(!res.ok){
          setMsg(data?.msg || "등록 실패", "bad");
          return;
        }

        setMsg("글이 등록되었습니다.", "ok");

        setTimeout(() => {
          location.href = "index.html#analysis";
        }, 800);

      }catch(e){
        setMsg("서버 응답 오류", "bad");
      }
    }
  </script>
</body>
</html>
